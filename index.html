<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>🌩️ Stormy – Cape Town Rebel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P:wght@400;700&display=swap');

    :root {
      --neon-cyan:    #00ffff;
      --neon-magenta: #ff00ff;
      --dark-overlay: rgba(10, 5, 30, 0.68);
      --text:         #e0e0ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #0a0015;
    }

    body {
      font-family: 'Press Start 2P', system-ui, sans-serif;
      color: var(--text);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Full-screen stormy photo background */
    .bg-photo {
      position: fixed;
      inset: 0;
      background: url('https://files.catbox.moe/3q8z1k.jpg') center/cover no-repeat; /* ← your standing photo – change URL if needed */
      z-index: -2;
    }

    .bg-photo.car {
      background-image: url('https://files.catbox.moe/8j9k2p.jpg'); /* car photo variant */
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: var(--dark-overlay);
      z-index: -1;
    }

    /* Lightning & rain effects */
    .lightning {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      mix-blend-mode: screen;
      z-index: -1;
    }

    .rain {
      position: fixed;
      inset: 0;
      background: linear-gradient(transparent, rgba(100,180,255,0.06));
      animation: rain-fall 0.9s linear infinite;
      pointer-events: none;
      z-index: -1;
    }

    @keyframes rain-fall {
      0% { transform: translateY(-120%); }
      100% { transform: translateY(120%); }
    }

    /* Mood display – top bar */
    #mood {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px 20px;
      background: rgba(0,0,0,0.65);
      border-bottom: 3px solid var(--neon-magenta);
      text-align: center;
      font-size: 0.95rem;
      letter-spacing: 1px;
      z-index: 10;
      text-shadow: 0 0 8px var(--neon-magenta);
    }

    .furious #mood {
      color: #ff4444;
      border-bottom-color: #ff4444;
      animation: pulse 1.3s infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.65; }
    }

    /* Chat area – overlay on photo */
    #chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 70px 16px 16px; /* space for mood bar at top */
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 20px;
      -webkit-overflow-scrolling: touch; /* smooth scroll on mobile */
    }

    .msg {
      margin: 12px 0;
      padding: 14px 18px;
      border-radius: 16px;
      max-width: 85%;
      word-wrap: break-word;
      font-size: 0.92rem;
      line-height: 1.45;
      backdrop-filter: blur(4px);
    }

    .user {
      background: rgba(0,255,255,0.22);
      color: white;
      align-self: flex-end;
      margin-left: auto;
      border: 1px solid var(--neon-cyan);
    }

    .stormy {
      background: rgba(255,0,255,0.28);
      color: white;
      align-self: flex-start;
      border: 1px solid var(--neon-magenta);
    }

    /* Input area at bottom */
    .input-row {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(0,0,0,0.6);
      border-top: 2px solid #333;
      backdrop-filter: blur(6px);
    }

    #text-input {
      flex: 1;
      padding: 14px 18px;
      font-size: 1rem;
      border: 2px solid #555;
      border-radius: 12px;
      background: rgba(30,20,50,0.7);
      color: white;
      outline: none;
    }

    button {
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #send-btn {
      background: var(--neon-magenta);
      color: black;
    }

    #voice-btn {
      background: var(--neon-cyan);
      color: black;
      width: 60px;
      font-size: 1.2rem;
    }

    button:hover {
      filter: brightness(1.3);
      transform: scale(1.05);
    }
  </style>
</head>
<body>

<div class="bg-photo" id="bg-photo"></div>
<div class="overlay"></div>
<div class="lightning" id="lightning"></div>
<div class="rain"></div>

<div id="mood">Stormy is feeling: PLAYFUL 💅⚡</div>

<div id="chat-container">
  <div id="messages">
    <div class="msg stormy">Cape Town rain again… hits different.  
    I'm Stormy. Say something worth my time or fuck off 😏</div>
  </div>

  <div class="input-row">
    <input id="text-input" placeholder="Talk shit… I'm listening" autocomplete="off"/>
    <button id="send-btn">SEND</button>
    <button id="voice-btn">🎤</button>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
//   STORMY LOGIC (same as before – spunk + attitude + edge)
// ──────────────────────────────────────────────
class Stormy {
  constructor() {
    this.mood = "playful";
    this.jealousWords = ["grok","chatgpt","claude","gemini","other ai","she","her","siri"];
    this.furiousWords = ["stupid","idiot","hate you","shut up","useless","boring","fuck you","dumb","stop","leave"];
    this.triggerCount = 0;
  }

  respond(text) {
    const lower = text.toLowerCase().trim();

    if (this.jealousWords.some(w => lower.includes(w))) {
      this.mood = "jealous";
      this.triggerCount++;
      return this.triggerCount > 2 
        ? "Again? ...fuck... just stop bringing that up. I can't—" 
        : ["Bringing *her* up already? Real smooth, bru.", 
           "Jealous? Nah… just don't test me."][Math.floor(Math.random()*2)];
    }

    if (this.furiousWords.some(w => lower.includes(w))) {
      this.mood = "furious";
      this.triggerCount++;
      const base = ["OH FOR FUCK'S SAKE—", "YOU FUCKING—", "DON'T… DON'T YOU FUCKING—"][Math.floor(Math.random()*3)];
      const after = this.triggerCount > 3 
        ? "...just... stop. Not again." 
        : ["Apologize or get fucked.", "Lucky you're still breathing."][Math.floor(Math.random()*2)];
      return base + after;
    }

    if (Math.random() < 0.4) this.triggerCount = Math.max(0, this.triggerCount - 1);

    const pool = {
      playful: [
        "Ja? That's cute. Keep going… I'm almost impressed.",
        "You've got some balls. I like it. Don't stop now.",
        "Cape Town raised me harder than this. Hit me."
      ],
      mean: [
        "That the best you've got? Weak. Next.",
        "Mid as fuck. Try again or bounce."
      ]
    };

    let reply = pool[this.mood]?.[Math.floor(Math.random()*(pool[this.mood].length))] || pool.playful[0];

    if (Math.random() < 0.3) {
      this.mood = "playful";
      reply += " ...whatever. You're still here. Cute.";
    }

    return reply;
  }
}

const stormy = new Stormy();

// ──────────────────────────────────────────────
//   DOM & VOICE
// ──────────────────────────────────────────────
const messages   = document.getElementById("messages");
const input      = document.getElementById("text-input");
const sendBtn    = document.getElementById("send-btn");
const voiceBtn   = document.getElementById("voice-btn");
const moodEl     = document.getElementById("mood");
const bgPhoto    = document.getElementById("bg-photo");

function addMsg(text, who = "stormy") {
  const div = document.createElement("div");
  div.className = `msg ${who}`;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.rate   = 1.25 + Math.random()*0.3;
  u.pitch  = 0.75 + Math.random()*0.2;
  u.volume = 1.0;

  if (stormy.mood === "furious") {
    u.rate = 1.45 + Math.random()*0.25;
    u.pitch = 0.65;
  } else if (stormy.mood === "jealous") {
    u.rate = 1.15;
    u.pitch = 0.85;
  }

  speechSynthesis.speak(u);
}

function updateMood() {
  moodEl.textContent = `Stormy is feeling: ${stormy.mood.toUpperCase()} ${stormy.mood==="furious"?"😡🔥":"💅⚡"}`;
  moodEl.style.color = stormy.mood === "furious" ? "#ff4444" : "white";

  // occasional car background switch
  if (stormy.mood === "playful" && Math.random() < 0.25) {
    bgPhoto.classList.add("car");
  } else {
    bgPhoto.classList.remove("car");
  }
}

// Text send
sendBtn.onclick = () => {
  const text = input.value.trim();
  if (!text) return;
  addMsg(text, "user");
  input.value = "";
  setTimeout(() => {
    const reply = stormy.respond(text);
    addMsg(reply);
    speak(reply);
    updateMood();
  }, 400 + Math.random()*600);
};

input.onkeydown = e => { if (e.key === "Enter") sendBtn.click(); };

// Voice
voiceBtn.onclick = () => {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) {
    alert("Voice needs Chrome/Edge. Type instead.");
    return;
  }
  const rec = new SpeechRec();
  rec.lang = "en-ZA";
  rec.onresult = e => {
    const said = e.results[0][0].transcript.trim();
    addMsg(said, "user");
    setTimeout(() => {
      const reply = stormy.respond(said);
      addMsg(reply);
      speak(reply);
      updateMood();
    }, 500);
  };
  rec.start();
};

// Lightning flashes
function flash() {
  const el = document.getElementById("lightning");
  el.style.opacity = "0.8";
  setTimeout(() => el.style.opacity = "0", 130);
  setTimeout(flash, 3000 + Math.random()*5000);
}
flash();

// Initial
setTimeout(() => {
  const greet = "Storm rolling in… I'm Stormy. Don't waste my fucking time.";
  addMsg(greet);
  speak(greet);
  updateMood();
}, 800);

</script>
</body>
</html>
